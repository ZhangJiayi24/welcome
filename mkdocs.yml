site_name: 2026年 UNNC 本科新生指南
site_description: 由学生维护的非官方 UNNC 本科新生指南框架
site_url: https://welcome.unncers.com/
copyright: 学生维护的非官方指南 · 正式信息请以学校最新通知为准

theme:
  name: material
  language: zh
  logo: https://www.nottingham.ac.uk/Brand/LegacyAssets/images-multimedia/2022/Logos/BrandEvolution-WhiteonNottinghamBlue-Cropped-450x173.png
  favicon: https://www.nottingham.edu.cn/favicon.ico
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: 切换至浅色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.code.copy

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - assets/stylesheets/brand.css

extra:
  generator: false
  alternate:
    - name: 中文
      link: /
      lang: zh

nav:
  - 首页:
      - 欢迎: index.md
      - 重要提示: important.md
  - 入学准备:
      - preparation/index.md
      - 新生时间线: preparation/timeline.md
      - 账号与邮箱: preparation/accounts.md
      - 缴费与材料: preparation/documents.md
      - 行李清单: preparation/checklist.md
      - 安全与防诈骗: preparation/safety.md
  - 抵达宁波:
      - arrival/index.md
      - 机场与车站: arrival/stations.md
      - 前往校园: arrival/to-campus.md
      - 抵达当天: arrival/first-day.md
  - 报到与迎新周:
      - registration/index.md
      - 报到流程: registration/process.md
      - 校园卡与宿舍入住: registration/campus-card.md
      - Welcome Week: registration/welcome-week.md
  - 学习与学术:
      - study/index.md
      - 教学系统: study/systems.md
      - Module 与学分: study/modules.md
      - 考核与考试: study/assessment.md
      - 学术诚信: study/integrity.md
      - 图书馆与学习空间: study/library.md
  - 选课与专业:
      - courses/index.md
      - 选课流程: courses/selection.md
      - Add Drop: courses/add-drop.md
      - 专业与转专业: courses/major.md
      - 交换与海外学习: courses/exchange.md
  - 校园生活:
      - campus-life/index.md
      - 宿舍: campus-life/accommodation.md
      - 餐饮: campus-life/food.md
      - 网络与 IT: campus-life/it.md
      - 快递与交通: campus-life/delivery-transport.md
      - 医疗与心理支持: campus-life/wellbeing.md
      - 体育与社团: campus-life/sports-societies.md
  - 宁波生活:
      - ningbo/index.md
      - 校园周边: ningbo/nearby.md
      - 公交与地铁: ningbo/transport.md
      - 购物与支付: ningbo/shopping-payment.md
  - 工具箱:
      - toolkit/index.md
      - 校园地图: toolkit/map.md
      - 校历: toolkit/calendar.md
      - 常用网站: toolkit/websites.md
      - 联系方式: toolkit/contacts.md
      - 缩写与术语: toolkit/glossary.md
      - 常见问题: toolkit/faq.md
  - 关于:
      - about/index.md
      - 参与贡献: about/contributing.md
      - 信息来源与审校: about/sources.md
      - 更新记录: about/changelog.md
      - 版权与免责声明: about/legal.md
