site_name: 2026年 UNNC 本科新生指引
site_description: 由学生维护的非官方 UNNC 本科新生指南框架
site_url: https://welcome.unncers.com/
repo_url: https://github.com/ZhangJiayi24/welcome
repo_name: ZhangJiayi24/welcome
copyright: >-
  Copyright &copy; 2026&ndash;present
  <a href="https://github.com/ZhangJiayi24/welcome">新生指引编委会</a><br>
  Made with <a href="https://squidfunk.github.io/mkdocs-material/">Material for MkDocs</a>

theme:
  name: material
  custom_dir: overrides
  language: zh
  logo: https://www.nottingham.ac.uk/Brand/LegacyAssets/images-multimedia/2022/Logos/BrandEvolution-WhiteonNottinghamBlue-Cropped-450x173.png
  favicon: https://www.nottingham.edu.cn/favicon.ico
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: 切换至浅色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.code.copy

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - assets/stylesheets/brand.css

extra_javascript:
  - assets/javascripts/mathjax.js
  - assets/javascripts/gallery.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  generator: false
  site_version: 2026.0.1

nav:
  - 首页:
      - 欢迎: index.md
      - 重要提示: important.md
      - 前言: preface.md
  - 常用信息:
      - 校历: toolkit/calendar.md
      - 校园地图: toolkit/map.md
      - 常用网站: toolkit/websites.md
      - 联系方式: toolkit/contacts.md
      - 黑话: toolkit/glossary.md
  - 入学准备:
      - 新生时间线: preparation/timeline.md
      - 账号与邮箱: preparation/accounts.md
      - 缴费与材料: preparation/documents.md
      - 物品准备: preparation/checklist.md
  - 报到:
      - 抵达宁波: arrival/index.md
      - 报到流程: registration/process.md
      - 校园卡与宿舍入住: registration/campus-card.md
      - 新生防骗: registration/anti-fraud.md
  - 军训:
      - registration/military-training.md
  - 迎新周 / iWeek:
      - registration/welcome-week.md
  - 学习:
      - 基本概念: study/basics.md
      - 请假: study/absence.md
      - 培养方案: study/modules.md
      - Exchange: study/exchange.md
      - Summer School: study/summer-school.md
      - 专业内容: study/majors.md
      - 学制选择与专业分流: study/pathways.md
      - 转专业政策: study/transfer.md
      - 科研与素质教育: study/development.md
      - 升学申请与推免: study/further-study.md
      - 邮件礼仪: study/email-etiquette.md
  - 奖助:
      - 奖学金: funding/scholarships.md
      - 荣誉称号: funding/honors.md
  - 校园生活:
      - 宿舍: campus-life/accommodation.md
      - 餐饮: campus-life/food.md
      - 网络与 IT: campus-life/it.md
      - 校园打印: campus-life/printing.md
      - 医疗与心理支持: campus-life/wellbeing.md
      - 体育与社团: campus-life/sports-societies.md
  - 宁波生活:
      - 校园周边: ningbo/nearby.md
      - 校外餐饮推荐: ningbo/food.md
  - 后记: about/index.md
